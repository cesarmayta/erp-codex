{% extends "base.html" %}
{% block title %}{{ title }} | ERP Codex{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card card-soft">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">{{ title }}</h1>
        <p class="text-muted">Se eliminara el registro <strong>{{ object }}</strong>. Esta accion no se puede deshacer.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-end gap-2">
            <a class="btn btn-light border" href="javascript:history.back()">Cancelar</a>
            <button class="btn btn-danger" type="submit">Eliminar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
